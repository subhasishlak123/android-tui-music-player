name: Build Android APK
on: [push]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      # THIS STEP FIXES YOUR ERROR
      - name: Install Android Platform 30
        run: |
          sdkmanager "platforms;android-30" "build-tools;30.0.3" "platform-tools"

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Build APK for ARM64
        run: cargo apk build --release --target aarch64-linux-android

      - name: Build APK for ARMv7
        run: cargo apk build --release --target armv7-linux-androideabi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: tui-music-player-apks
          path: target/release/apk/*.apk
