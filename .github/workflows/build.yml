name: Build Android TUI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Targets for both modern and older Android phones
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build for ARMv7 (32-bit)
        run: cargo ndk -t armeabi-v7a build --release

      - name: Build for ARM64 (64-bit)
        run: cargo ndk -t arm64-v8a build --release

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: tui-player-android
          path: |
            target/armv7-linux-androideabi/release/tui-player
            target/aarch64-linux-android/release/tui-player
